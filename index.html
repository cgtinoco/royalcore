<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA ROYAL CORE | Painel de Controle Portaria</title>
    
    <!-- CSS: Leaflet, Bootstrap e FontAwesome -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- Firebase SDK (Versão Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0f0f0f; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Layout Principal */
        .main-container { display: flex; height: 100vh; width: 100vw; }
        
        /* Mapa (75% da tela) */
        #map { flex-grow: 1; height: 100%; background: #000; }

        /* Barra Lateral (25% da tela) */
        .sidebar { 
            width: 400px; background: #1a1a1a; border-left: 1px solid #333; 
            display: flex; flex-direction: column; color: #eee;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }
        
        /* Cabeçalho do Painel */
        .sidebar-header { padding: 25px 20px; background: #222; border-bottom: 2px solid #28a745; }
        .sidebar-header h5 { color: #28a745; font-weight: bold; letter-spacing: 1.5px; margin: 0; }

        /* Barra de Estatísticas */
        .stats-bar { display: flex; justify-content: space-around; padding: 15px; background: #111; border-bottom: 1px solid #333; font-size: 0.8rem; }
        .stat-item { text-align: center; }
        .stat-num { font-size: 1.4rem; font-weight: bold; display: block; color: #fff; }

        /* Lista de Entregadores */
        .delivery-list { flex-grow: 1; overflow-y: auto; padding: 15px; background: #1a1a1a; }
        .section-title { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1.5px; margin: 20px 0 10px 0; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        /* Card Individual */
        .delivery-card { 
            background: #252525; border-radius: 12px; padding: 15px; margin-bottom: 12px;
            border-left: 8px solid #444; border-right: 1px solid #333; transition: 0.3s; cursor: pointer;
        }
        .delivery-card:hover { background: #303030; transform: translateX(-5px); }
        
        /* Estados de Alerta */
        .card-danger { border-left-color: #ff4d4d; background: #321c1c; } /* Alta Velocidade */
        .card-warning { border-left-color: #ffcc00; opacity: 0.8; }         /* Sinal Perdido */
        .card-success { border-left-color: #2ecc71; }                      /* Normal */

        .house-badge { background: #28a745; color: #fff; padding: 4px 10px; border-radius: 6px; font-weight: bold; font-size: 1rem; }
        .speed-val { font-size: 1.1rem; font-weight: bold; }
        .text-danger { color: #ff4d4d !important; }
        
        /* Scrollbar customizada */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Som de Alerta -->
    <audio id="alert-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <div class="main-container">
        <!-- ÁREA DO MAPA -->
        <div id="map"></div>

        <!-- BARRA LATERAL -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h5><i class="fas fa-shield-halved me-2"></i> ROYAL CORE</h5>
                <p class="small text-muted mb-0">Painel de Monitoramento Portaria</p>
            </div>

            <div class="stats-bar">
                <div class="stat-item text-white"><span id="count-total" class="stat-num">0</span>TOTAL</div>
                <div class="stat-item text-danger"><span id="count-speed" class="stat-num">0</span>ALERTA</div>
                <div class="stat-item text-warning"><span id="count-lost" class="stat-num">0</span>OFFLINE</div>
            </div>

            <div class="delivery-list">
                <!-- SEÇÃO: ALERTAS -->
                <div class="section-title text-danger"><i class="fas fa-triangle-exclamation me-2"></i>Alta Velocidade</div>
                <div id="list-alerts"></div>

                <!-- SEÇÃO: SINAL PERDIDO -->
                <div class="section-title text-warning"><i class="fas fa-wifi-slash me-2"></i>Sinal Instável (Interno)</div>
                <div id="list-lost"></div>

                <!-- SEÇÃO: NORMAL -->
                <div class="section-title text-success"><i class="fas fa-circle-check me-2"></i>Trânsito Normal</div>
                <div id="list-normal"></div>
            </div>
        </div>
    </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. CONFIGURAÇÃO DO SEU FIREBASE (COPIADA DO SEU PRINT)
    const firebaseConfig = {
        apiKey: "AIzaSyAEubOl0sTtLUfyX13CS_YN-xWupU7ok0w",
        authDomain: "royal-boulevard.firebaseapp.com",
        databaseURL: "https://royal-boulevard-default-rtdb.firebaseio.com",
        projectId: "royal-boulevard",
        storageBucket: "royal-boulevard.firebasestorage.app",
        messagingSenderId: "406525342067",
        appId: "1:406525342067:web:79ccfc1db4c32bf4095506",
        measurementId: "G-NGL8EPF0GW"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. INICIALIZAÇÃO DO MAPA
    var map = L.map('map', { zoomControl: false }).setView([-21.7531, -41.3566], 17);
    
    // Camada de Satélite (Esri)
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
    // Rótulos de ruas por cima (CartoDB)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png').addTo(map);

    // Carregar o arquivo GeoJSON (map.geojson)
    fetch('map.geojson').then(r => r.json()).then(data => {
        L.geoJSON(data, { style: { color: "#28a745", weight: 2, fillOpacity: 0.05 } }).addTo(map);
    }).catch(err => console.log("Aviso: map.geojson não encontrado."));

    var markers = {};
    var circles = {};
    var lastAlertCount = 0;

    // 3. FUNÇÃO DE ATUALIZAÇÃO EM TEMPO REAL
    db.ref('trackers').on('value', (snapshot) => {
        const data = snapshot.val() || {}; // Dados do Firebase
        const listAlerts = document.getElementById('list-alerts');
        const listLost = document.getElementById('list-lost');
        const listNormal = document.getElementById('list-normal');
        
        listAlerts.innerHTML = ''; listLost.innerHTML = ''; listNormal.innerHTML = '';
        
        let cSpeed = 0; let cLost = 0;
        const users = Object.keys(data);
        document.getElementById('count-total').innerText = users.length;
        const now = Date.now();

        // --- LÓGICA DE REMOÇÃO FÍSICA DO MAPA (CHECK-OUT) ---
        Object.keys(markers).forEach(id => {
            if (!data[id]) {
                map.removeLayer(markers[id]); // Remove ícone
                if(circles[id]) map.removeLayer(circles[id]); // Remove círculo
                delete markers[id];
                delete circles[id];
            }
        });

        // --- ATUALIZAÇÃO DA INTERFACE ---
        users.forEach(id => {
            const u = data[id];
            const pos = [u.lat, u.lng];
            const diff = (now - u.timestamp) / 1000;
            const isLost = diff > 45; // Se não houver sinal há mais de 45 segundos
            const isFast = u.speed > 30; // Alerta acima de 30 km/h

            if(isFast) cSpeed++;
            if(isLost) cLost++;

            // Atualiza Marcadores no Mapa
            if (markers[id]) {
                markers[id].setLatLng(pos).setOpacity(isLost ? 0.4 : 1.0);
                circles[id].setLatLng(pos).setRadius(u.accuracy);
            } else {
                markers[id] = L.marker(pos).addTo(map).bindPopup(`<b>${u.name}</b><br>Casa: ${u.house}`);
                circles[id] = L.circle(pos, {radius: u.accuracy, weight: 1, color: '#28a745'}).addTo(map);
            }

            // Define Seção na Barra Lateral
            let targetList = listNormal;
            let cardClass = 'card-success';
            
            if (isFast) {
                targetList = listAlerts;
                cardClass = 'card-danger';
            } else if (isLost) {
                targetList = listLost;
                cardClass = 'card-warning';
            }

            const card = `
                <div class="delivery-card ${cardClass}" onclick="map.flyTo([${u.lat}, ${u.lng}], 19)">
                    <div class="d-flex justify-content-between align-items-center">
                        <strong>${u.name}</strong>
                        <span class="house-badge">${u.house}</span>
                    </div>
                    <div class="d-flex justify-content-between mt-2 small">
                        <span><i class="fas fa-car-side me-1"></i> ${u.plate}</span>
                        <span class="speed-val ${isFast ? 'text-danger' : ''}">${u.speed.toFixed(1)} km/h</span>
                    </div>
                    ${isLost ? `<div class="text-warning small mt-1"><i class="fas fa-wifi-slash"></i> Sinal perdido há ${Math.floor(diff)}s</div>` : ''}
                </div>
            `;
            targetList.innerHTML += card;
        });

        // Atualiza contadores globais
        document.getElementById('count-speed').innerText = cSpeed;
        document.getElementById('count-lost').innerText = cLost;

        // Toca som se houver novo alerta de velocidade
        if (cSpeed > lastAlertCount) { document.getElementById('alert-sound').play(); }
        lastAlertCount = cSpeed;
    });

</script>
</body>
</html>
