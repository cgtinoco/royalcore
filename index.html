<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA ROYAL CORE | Painel Firebase</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Scripts Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #121212; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .main-container { display: flex; height: 100vh; width: 100vw; }
        #map { flex-grow: 1; height: 100%; }
        .sidebar { width: 380px; background: #1a1a1a; border-left: 1px solid #333; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: #222; border-bottom: 2px solid #28a745; }
        .stats-bar { display: flex; justify-content: space-around; padding: 15px; background: #111; border-bottom: 1px solid #333; }
        .stat-num { font-size: 1.2rem; font-weight: bold; display: block; }
        .delivery-list { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .section-title { font-size: 0.7rem; color: #888; text-transform: uppercase; margin: 15px 0 10px 0; font-weight: bold; }
        .delivery-card { background: #252525; border-radius: 10px; padding: 12px; margin-bottom: 10px; border-left: 6px solid #444; cursor: pointer; }
        .card-danger { border-left-color: #ff4d4d; background: #321c1c; }
        .card-warning { border-left-color: #ffcc00; opacity: 0.7; }
        .card-success { border-left-color: #2ecc71; }
        .house-badge { background: #28a745; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="main-container">
        <div id="map"></div>
        <div class="sidebar">
            <div class="sidebar-header">
                <h5><i class="fas fa-shield-halved me-2"></i> ROYAL CORE</h5>
                <p class="small text-muted mb-0">Monitoramento Satélite Ativo</p>
            </div>
            <div class="stats-bar text-center">
                <div class="text-white"><span id="count-total" class="stat-num">0</span>TOTAL</div>
                <div class="text-danger"><span id="count-speed" class="stat-num">0</span>ALERTA</div>
                <div class="text-warning"><span id="count-lost" class="stat-num">0</span>OFFLINE</div>
            </div>
            <div class="delivery-list">
                <div class="section-title text-danger">⚠️ ALERTA DE VELOCIDADE</div>
                <div id="list-alerts"></div>
                <div class="section-title text-warning">⏳ SINAL INSTÁVEL (DENTRO)</div>
                <div id="list-lost"></div>
                <div class="section-title text-success">🟢 TRÂNSITO NORMAL</div>
                <div id="list-normal"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Configuração do seu Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAEubOl0sTtLUfyX13CS_YN-xWupU7ok0w",
            authDomain: "royal-boulevard.firebaseapp.com",
            databaseURL: "https://royal-boulevard-default-rtdb.firebaseio.com",
            projectId: "royal-boulevard",
            storageBucket: "royal-boulevard.firebasestorage.app",
            messagingSenderId: "406525342067",
            appId: "1:406525342067:web:79ccfc1db4c32bf4095506",
            measurementId: "G-NGL8EPF0GW"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        var map = L.map('map', { zoomControl: false }).setView([-21.7531, -41.3566], 17);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png').addTo(map);

        // Carrega o seu arquivo map.geojson (deve estar na mesma pasta)
        fetch('map.geojson').then(r => r.json()).then(data => {
            L.geoJSON(data, { style: { color: "#00ff00", weight: 2, fillOpacity: 0.05 } }).addTo(map);
        }).catch(err => console.log("GeoJSON não encontrado localmente"));

        var markers = {};

        // Escuta o Banco de Dados em Tempo Real
        db.ref('trackers').on('value', (snapshot) => {
            const data = snapshot.val();
            const listAlerts = document.getElementById('list-alerts');
            const listLost = document.getElementById('list-lost');
            const listNormal = document.getElementById('list-normal');
            
            listAlerts.innerHTML = ''; listLost.innerHTML = ''; listNormal.innerHTML = '';
            let cTotal = 0, cSpeed = 0, cLost = 0;
            const now = Date.now();

            if (data) {
                Object.keys(data).forEach(id => {
                    const u = data[id];
                    const diff = (now - u.timestamp) / 1000;

                    // Ignora dados com mais de 15 minutos (limpeza visual)
                    if (diff > 900) return; 

                    cTotal++;
                    const isLost = diff > 45;
                    const isFast = u.speed > 30;
                    if(isFast) cSpeed++; if(isLost) cLost++;

                    // Atualiza Marcadores
                    if (markers[id]) {
                        markers[id].setLatLng([u.lat, u.lng]).setOpacity(isLost ? 0.4 : 1);
                    } else {
                        markers[id] = L.marker([u.lat, u.lng]).addTo(map).bindPopup(u.name);
                    }

                    // Define Seção na Lista
                    let target = listNormal; let cClass = 'card-success';
                    if (isFast) { target = listAlerts; cClass = 'card-danger'; }
                    else if (isLost) { target = listLost; cClass = 'card-warning'; }

                    target.innerHTML += `
                        <div class="delivery-card ${cClass}" onclick="map.flyTo([${u.lat}, ${u.lng}], 19)">
                            <div class="d-flex justify-content-between">
                                <strong>${u.name}</strong>
                                <span class="house-badge">${u.house}</span>
                            </div>
                            <div class="small mt-1">Placa: ${u.plate} | Vel: ${u.speed.toFixed(1)} km/h</div>
                            ${isLost ? `<div class="text-warning small mt-1">Sinal perdido há ${Math.floor(diff)}s</div>` : ''}
                        </div>`;
                });
            }
            document.getElementById('count-total').innerText = cTotal;
            document.getElementById('count-speed').innerText = cSpeed;
            document.getElementById('count-lost').innerText = cLost;
        });
    </script>
</body>
</html>
