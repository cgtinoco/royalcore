<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Check-in Royal Core</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #121212; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .form-box { background: #1e1e1e; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid #333; }
        .form-control { background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 12px; margin-bottom: 15px; }
        .form-control:focus { background: #333; color: #fff; border-color: #28a745; box-shadow: none; }
    </style>
</head>
<body>
    <div id="setup" class="form-box shadow-lg">
        <h4 class="text-center mb-4 text-success">Check-in Visitante</h4>
        <input type="text" id="name" class="form-control" placeholder="Nome Completo">
        <input type="text" id="plate" class="form-control" placeholder="Placa do Veículo">
        <input type="number" id="house" class="form-control" placeholder="Número da Casa">
        <button class="btn btn-success w-100 py-3 fw-bold" onclick="ativar()">ATIVAR MONITORAMENTO</button>
    </div>

    <div id="active" style="display:none;" class="text-center">
        <div class="spinner-grow text-success mb-4" style="width: 5rem; height: 5rem;"></div>
        <h3 class="text-success">RASTREIO ATIVO</h3>
        <p class="text-muted small">Mantenha esta tela aberta até sair do condomínio.</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAEubOl0sTtLUfyX13CS_YN-xWupU7ok0w",
            authDomain: "royal-boulevard.firebaseapp.com",
            databaseURL: "https://royal-boulevard-default-rtdb.firebaseio.com",
            projectId: "royal-boulevard",
            storageBucket: "royal-boulevard.firebasestorage.app",
            messagingSenderId: "406525342067",
            appId: "1:406525342067:web:79ccfc1db4c32bf4095506"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Recupera dados salvos
        document.getElementById('name').value = localStorage.getItem('user_name') || '';
        document.getElementById('plate').value = localStorage.getItem('user_plate') || '';

        async function ativar() {
            const name = document.getElementById('name').value;
            const plate = document.getElementById('plate').value;
            const house = document.getElementById('house').value;
            if(!name || !plate || !house) return alert("Preencha tudo!");

            localStorage.setItem('user_name', name);
            localStorage.setItem('user_plate', plate);
            if ('wakeLock' in navigator) { try { await navigator.wakeLock.request('screen'); } catch(e){} }

            document.getElementById('setup').style.display = 'none';
            document.getElementById('active').style.display = 'block';

            const uid = 'U-' + Math.floor(Math.random() * 9999);

            navigator.geolocation.watchPosition((pos) => {
                db.ref('trackers/' + uid).set({
                    name, plate, house,
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    accuracy: pos.coords.accuracy,
                    speed: (pos.coords.speed || 0) * 3.6,
                    timestamp: Date.now()
                });
            }, null, { enableHighAccuracy: true, maximumAge: 0 });
        }
    </script>
</body>
</html>
