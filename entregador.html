<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Check-in Royal Core</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #0f0f0f; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; font-family: sans-serif; }
        .form-box { background: #1a1a1a; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid #333; }
        .form-control { background: #2a2a2a !important; border: 2px solid #444 !important; color: #fff !important; padding: 15px !important; margin-bottom: 20px !important; }
        .btn-success { background: #28a745; border: none; padding: 18px; font-weight: bold; border-radius: 12px; }
        .btn-danger { background: #dc3545; border: none; padding: 15px; font-weight: bold; border-radius: 12px; margin-top: 20px; width: 100%; }
        .radar-icon { animation: pulse 2s infinite; color: #28a745; font-size: 4rem; margin-bottom: 20px; text-align: center;}
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.7; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.7; } }
    </style>
</head>
<body>
    <div id="setup" class="form-box shadow-lg">
        <h4 class="text-center text-success mb-4">CHECK-IN ROYAL</h4>
        <input type="text" id="name" class="form-control" placeholder="Seu Nome">
        <input type="text" id="plate" class="form-control" placeholder="Placa do Veículo">
        <input type="number" id="house" class="form-control" placeholder="Casa Destino">
        <button class="btn btn-success w-100" onclick="ativar()">INICIAR MONITORAMENTO</button>
    </div>

    <div id="active" style="display:none;" class="form-box text-center">
        <div class="radar-icon"><i class="fas fa-satellite-dish"></i></div>
        <h3 class="text-success fw-bold">RASTREIO ATIVO</h3>
        <p class="text-muted small">Não feche esta aba até sair.</p>
        <button class="btn btn-danger" onclick="encerrarSaida()">ENCERRAR E SAIR</button>
    </div>

    <div id="finished" style="display:none;" class="form-box text-center">
        <i class="fas fa-check-circle text-success" style="font-size: 4rem; margin-bottom: 20px;"></i>
        <h3>SAÍDA CONFIRMADA</h3>
        <p class="text-muted">GPS Desligado. Obrigado!</p>
        <button class="btn btn-outline-secondary w-100 mt-3" onclick="location.reload()">NOVA ENTRADA</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAEubOl0sTtLUfyX13CS_YN-xWupU7ok0w",
            authDomain: "royal-boulevard.firebaseapp.com",
            databaseURL: "https://royal-boulevard-default-rtdb.firebaseio.com",
            projectId: "royal-boulevard",
            storageBucket: "royal-boulevard.firebasestorage.app",
            messagingSenderId: "406525342067",
            appId: "1:406525342067:web:79ccfc1db4c32bf4095506"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let watchId = null;
        // ID FIXO por celular para evitar ícones fantasmas
        let uid = localStorage.getItem('v_uid') || ('R-' + Math.floor(Math.random() * 9999));
        localStorage.setItem('v_uid', uid);

        document.getElementById('name').value = localStorage.getItem('user_name') || '';
        document.getElementById('plate').value = localStorage.getItem('user_plate') || '';

        async function ativar() {
            const name = document.getElementById('name').value;
            const plate = document.getElementById('plate').value;
            const house = document.getElementById('house').value;
            if(!name || !plate || !house) return alert("Preencha tudo!");

            localStorage.setItem('user_name', name);
            localStorage.setItem('user_plate', plate);
            if ('wakeLock' in navigator) await navigator.wakeLock.request('screen').catch(e=>{});

            document.getElementById('setup').style.display = 'none';
            document.getElementById('active').style.display = 'block';

            watchId = navigator.geolocation.watchPosition((pos) => {
                db.ref('trackers/' + uid).set({
                    name, plate, house,
                    lat: pos.coords.latitude, lng: pos.coords.longitude,
                    accuracy: pos.coords.accuracy,
                    speed: (pos.coords.speed || 0) * 3.6,
                    timestamp: Date.now()
                });
            }, null, { enableHighAccuracy: true, maximumAge: 0 });
        }

        function encerrarSaida() {
            if (confirm("Encerrar monitoramento?")) {
                if (watchId) navigator.geolocation.clearWatch(watchId);
                db.ref('trackers/' + uid).remove().then(() => {
                    document.getElementById('active').style.display = 'none';
                    document.getElementById('finished').style.display = 'block';
                });
            }
        }
    </script>
</body>
</html>
